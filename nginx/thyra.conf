# /etc/nginx/sites-available/thyra
# Thyra - reverse proxy vers Gunicorn

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 512M;
    client_body_timeout  300s;
    send_timeout         300s;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 4;

    # ── Static files - servis directement par Nginx ────────────────────────
    location /static/ {
        alias /opt/thyra/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Assets uploadés - servis directement ──────────────────────────────
    location /assets_files/ {
        alias /opt/thyra/assets/;
        expires 1h;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        # Streaming vidéo : autorise range requests
        access_log off;
    }

    # ── Application Flask via Gunicorn ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # ── Upload progress (pour les gros fichiers) ──────────────────────────
    location = /favicon.ico { 
        alias /opt/thyra/static/img/favicon.svg;
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/thyra_access.log;
    error_log  /var/log/nginx/thyra_error.log warn;
}
